<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>מחשבון שעות</title>
    <link rel="icon" href="data:," />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;600;800&family=Heebo:wght@300;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: dark;
        --bg: #090c0a;
        --bg-2: #0d1411;
        --panel: #0f1914;
        --panel-2: #141f18;
        --text: #e8ffe9;
        --muted: #9cc9a6;
        --green: #35ff6b;
        --green-2: #19cc59;
        --border: #1d3a2a;
        --shadow: 0 18px 60px rgba(3, 25, 12, 0.65);
        --danger: #ff6b6b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Rubik", "Heebo", sans-serif;
        background: radial-gradient(circle at 15% 20%, #17301f 0%, transparent 55%),
          radial-gradient(circle at 80% 10%, #0d2416 0%, transparent 45%),
          linear-gradient(160deg, var(--bg), var(--bg-2));
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px 18px 48px;
      }

      .app {
        width: min(880px, 96vw);
      }

      .header {
        text-align: center;
        margin-bottom: 24px;
      }

      .header h1 {
        font-size: clamp(2rem, 2.8vw, 2.7rem);
        margin: 0;
        color: var(--text);
        letter-spacing: 0.04em;
      }

      .header p {
        margin: 8px 0 0;
        color: var(--muted);
        font-weight: 300;
      }

      .panel {
        background: linear-gradient(160deg, var(--panel), var(--panel-2));
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 28px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(8px);
      }

      .panel-layout {
        display: grid;
        grid-template-columns: minmax(0, 1.8fr) minmax(240px, 0.95fr);
        gap: 20px;
        align-items: start;
      }

      .calculator-area {
        min-width: 0;
      }

      .quick-panel {
        border: 1px solid rgba(53, 255, 107, 0.14);
        border-radius: 18px;
        padding: 18px;
        background:
          radial-gradient(circle at 85% 15%, rgba(53, 255, 107, 0.1), transparent 38%),
          linear-gradient(165deg, rgba(12, 22, 17, 0.96), rgba(15, 27, 20, 0.92));
        box-shadow: inset 0 1px 0 rgba(235, 255, 240, 0.03);
      }

      .quick-panel h2 {
        margin: 0 0 8px;
        font-size: 1.05rem;
      }

      .quick-panel p {
        margin: 0 0 14px;
        color: var(--muted);
        font-size: 0.9rem;
        line-height: 1.45;
      }

      .command-list {
        display: grid;
        gap: 10px;
      }

      .command-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 10px;
        align-items: center;
        padding: 10px 12px;
        border: 1px solid rgba(53, 255, 107, 0.14);
        border-radius: 14px;
        background: rgba(8, 16, 12, 0.62);
      }

      .command-code {
        direction: ltr;
        text-align: left;
        font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
        font-size: 0.98rem;
        color: #effff2;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .copy-command-button {
        min-width: 86px;
        border: 1px solid rgba(53, 255, 107, 0.26);
        border-radius: 999px;
        background: rgba(18, 34, 25, 0.92);
        color: var(--text);
        padding: 9px 14px;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease,
          color 0.2s ease;
      }

      .copy-command-button:hover,
      .copy-command-button:focus-visible {
        border-color: rgba(75, 255, 133, 0.72);
        transform: translateY(-1px);
      }

      .copy-command-button.is-copied {
        background: linear-gradient(135deg, #1edb5f, #4bff85);
        border-color: transparent;
        color: #05140a;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 18px;
        margin-bottom: 20px;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .label {
        font-size: 0.95rem;
        color: var(--muted);
      }

      .input {
        width: 100%;
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid #23412f;
        background: #0b1410;
        color: var(--text);
        font-size: 1rem;
        outline: none;
        transition: border 0.2s ease, box-shadow 0.2s ease;
      }

      .input:focus {
        border-color: var(--green);
        box-shadow: 0 0 0 2px rgba(53, 255, 107, 0.2);
      }

      .helper {
        font-size: 0.85rem;
        color: var(--muted);
      }

      .mode-section {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-bottom: 20px;
      }

      .mode-switch {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .mode-option {
        flex: 1 1 180px;
      }

      .mode-input {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }

      .mode-pill {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        padding: 12px 16px;
        border-radius: 14px;
        border: 1px solid rgba(53, 255, 107, 0.18);
        background: rgba(8, 16, 12, 0.55);
        color: var(--muted);
        font-weight: 600;
        cursor: pointer;
        transition: border-color 0.2s ease, background 0.2s ease, color 0.2s ease,
          transform 0.2s ease;
      }

      .mode-input:checked + .mode-pill {
        border-color: rgba(75, 255, 133, 0.7);
        background: rgba(20, 42, 28, 0.92);
        color: var(--text);
        transform: translateY(-1px);
      }

      .mode-panel[hidden] {
        display: none;
      }

      .field.full-span {
        grid-column: 1 / -1;
      }

      .toggle-card {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        padding: 14px 16px;
        border-radius: 14px;
        border: 1px solid rgba(53, 255, 107, 0.14);
        background: rgba(8, 16, 12, 0.55);
        cursor: pointer;
      }

      .toggle-card input {
        width: 18px;
        height: 18px;
        margin: 2px 0 0;
        accent-color: var(--green);
        cursor: pointer;
      }

      .toggle-copy {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .result {
        font-size: 1.15rem;
        padding: 14px 16px;
        border-radius: 14px;
        background: rgba(10, 24, 16, 0.7);
        border: 1px solid #1d3a2a;
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 18px;
      }

      .result-row {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .result-label {
        color: var(--muted);
        font-size: 0.95rem;
      }

      .result strong {
        color: var(--green);
        font-size: 1.35rem;
      }

      .result strong.is-muted {
        color: var(--muted);
      }

      .result strong.is-error {
        color: var(--danger);
      }

      .result.error {
        border-color: rgba(255, 107, 107, 0.4);
        color: #ffd7d7;
      }

      .result.error strong {
        color: var(--danger);
      }

      .actions {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 16px;
        margin-bottom: 16px;
      }

      .glow-button {
        background: linear-gradient(135deg, #1edb5f, #4bff85);
        color: #05140a;
        border: none;
        padding: 12px 28px;
        font-size: 1.05rem;
        font-weight: 700;
        border-radius: 999px;
        cursor: pointer;
        box-shadow: 0 0 18px rgba(53, 255, 107, 0.45), 0 8px 30px rgba(11, 56, 22, 0.7);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }

      .glow-button:hover {
        transform: translateY(-1px);
        box-shadow: 0 0 24px rgba(53, 255, 107, 0.7), 0 10px 34px rgba(11, 56, 22, 0.85);
      }

      @media (max-width: 820px) {
        .panel-layout {
          grid-template-columns: minmax(0, 1fr);
        }
      }

      @media (max-width: 560px) {
        .panel {
          padding: 20px;
        }

        .command-row {
          grid-template-columns: minmax(0, 1fr);
        }

        .copy-command-button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="header">
        <h1>מחשבון שעות</h1>
        <p>מחשבים כמה נשאר לסיים את היעד בזמן אמת.</p>
      </header>

      <section class="panel">
        <div class="panel-layout">
          <div class="calculator-area">
            <div class="grid">
              <label class="field">
                <span class="label">כמה שעות צריך</span>
                <input
                  id="requiredInput"
                  class="input"
                  type="text"
                  inputmode="decimal"
                  placeholder="לדוגמה: 7.5 או 7:30"
                  autocomplete="off"
                />
                <span class="helper">אפשר להזין שעות עשרוניות או בפורמט שעה:דקה.</span>
              </label>

              <label class="field">
                <span class="label">כמה שעות עשיתי עד עכשיו</span>
                <input
                  id="completedInput"
                  class="input"
                  type="text"
                  inputmode="decimal"
                  placeholder="לדוגמה: 3 או 2:15"
                  autocomplete="off"
                />
                <span class="helper">לדוגמה: 2.25 = שעתיים ורבע.</span>
              </label>
            </div>

            <div class="mode-section">
              <span class="label">איך לחשב את הימים שנשארו</span>
              <div class="mode-switch" role="radiogroup" aria-label="בחירת מצב חישוב">
                <label class="mode-option">
                  <input
                    class="mode-input"
                    type="radio"
                    name="calculationMode"
                    value="date"
                    checked
                  />
                  <span class="mode-pill">תאריך יעד</span>
                </label>
                <label class="mode-option">
                  <input class="mode-input" type="radio" name="calculationMode" value="weekday" />
                  <span class="mode-pill">ימי שבוע</span>
                </label>
              </div>
            </div>

            <div class="mode-panel" id="dateModePanel">
              <div class="grid">
                <label class="field">
                  <span class="label">תאריך יעד</span>
                  <input id="deadlineInput" class="input" type="date" />
                  <span class="helper">החישוב היומי יתעדכן לפי מספר הימים עד התאריך שבחרתם.</span>
                </label>
              </div>
            </div>

            <div class="mode-panel" id="weekdayModePanel" hidden>
              <div class="grid">
                <label class="field">
                  <span class="label">היום הנוכחי</span>
                  <select id="currentDaySelect" class="input">
                    <option value="0">יום ראשון</option>
                    <option value="1">יום שני</option>
                    <option value="2">יום שלישי</option>
                    <option value="3">יום רביעי</option>
                    <option value="4">יום חמישי</option>
                    <option value="5">יום שישי</option>
                    <option value="6">שבת</option>
                  </select>
                  <span class="helper">בחרו מאיזה יום מתחילים לספור.</span>
                </label>

                <label class="field">
                  <span class="label">יום יעד</span>
                  <select id="targetDaySelect" class="input">
                    <option value="0">יום ראשון</option>
                    <option value="1">יום שני</option>
                    <option value="2">יום שלישי</option>
                    <option value="3">יום רביעי</option>
                    <option value="4">יום חמישי</option>
                    <option value="5">יום שישי</option>
                    <option value="6">שבת</option>
                  </select>
                  <span class="helper">החישוב יתקדם קדימה לאורך השבוע עד ליום שבחרתם.</span>
                </label>

                <label class="field full-span">
                  <span class="label">אפשרות הכללה</span>
                  <span class="toggle-card">
                    <input id="includeTodayInput" type="checkbox" checked />
                    <span class="toggle-copy">
                      <span>לכלול את היום הנוכחי בחישוב</span>
                      <span class="helper">
                        מסומן = סופרים גם את היום שנבחר. לא מסומן = מתחילים מהיום הבא.
                      </span>
                    </span>
                  </span>
                </label>
              </div>
            </div>

            <div class="result" id="resultBox">
              <div class="result-row">
                <span class="result-label">כמה נשאר לי:</span>
                <strong id="resultValue">—</strong>
              </div>
              <div class="result-row">
                <span class="result-label">כמה שעות צריך ביום:</span>
                <strong id="dailyHoursValue">—</strong>
              </div>
            </div>

            <div class="actions">
              <button class="glow-button" id="resetButton" type="button">איפוס</button>
            </div>
          </div>

          <aside class="quick-panel" aria-label="פקודות מהירות">
            <h2>פקודות מהירות</h2>
            <p>העתקה מהירה של פקודות נפוצות בלי לשנות את החישוב.</p>
            <div class="command-list">
              <div class="command-row">
                <code class="command-code">/start</code>
                <button class="copy-command-button" type="button" data-copy-command="/start">
                  העתק
                </button>
              </div>
              <div class="command-row">
                <code class="command-code">/end</code>
                <button class="copy-command-button" type="button" data-copy-command="/end">
                  העתק
                </button>
              </div>
              <div class="command-row">
                <code class="command-code">/times</code>
                <button class="copy-command-button" type="button" data-copy-command="/times">
                  העתק
                </button>
              </div>
            </div>
          </aside>
        </div>
      </section>
    </main>

    <script>
      const requiredInput = document.getElementById("requiredInput");
      const completedInput = document.getElementById("completedInput");
      const deadlineInput = document.getElementById("deadlineInput");
      const currentDaySelect = document.getElementById("currentDaySelect");
      const targetDaySelect = document.getElementById("targetDaySelect");
      const includeTodayInput = document.getElementById("includeTodayInput");
      const dateModePanel = document.getElementById("dateModePanel");
      const weekdayModePanel = document.getElementById("weekdayModePanel");
      const resultBox = document.getElementById("resultBox");
      const resultValue = document.getElementById("resultValue");
      const dailyHoursValue = document.getElementById("dailyHoursValue");
      const resetButton = document.getElementById("resetButton");
      const copyCommandButtons = Array.from(document.querySelectorAll("[data-copy-command]"));
      const calculationModeInputs = Array.from(
        document.querySelectorAll('input[name="calculationMode"]'),
      );

      const sanitizeInput = (value) =>
        value.replace(/[\u200e\u200f\u202a-\u202e]/g, "").trim();

      const parseHebrewTimeToMinutes = (rawValue) => {
        const normalized = rawValue
          .replace(/,/g, " ")
          .replace(/\s+/g, " ")
          .trim();

        if (!normalized) {
          return null;
        }

        const unitRegex = /(\d+(?:[.,]\d+)?)\s*(שעה|שעות|דק(?:ה|ות))/g;
        const toNumber = (value) => Number(value.replace(",", "."));

        let hoursTotal = 0;
        let minutesTotal = 0;
        let matched = false;
        let match;

        while ((match = unitRegex.exec(normalized)) !== null) {
          matched = true;
          const amount = toNumber(match[1]);
          if (!Number.isFinite(amount) || amount < 0) {
            return null;
          }

          const unit = match[2];
          if (unit === "שעה" || unit === "שעות") {
            hoursTotal += amount;
          } else {
            minutesTotal += amount;
          }
        }

        if (!matched) {
          return null;
        }

        return Math.round(hoursTotal * 60 + minutesTotal);
      };

      const parseTimeToMinutes = (value) => {
        const raw = sanitizeInput(value);
        if (!raw) {
          return null;
        }

        const hhmmMatch = raw.match(/^(\d+)\s*:\s*(\d{1,2})$/);
        if (hhmmMatch) {
          const hours = Number(hhmmMatch[1]);
          const minutes = Number(hhmmMatch[2]);
          if (!Number.isFinite(hours) || !Number.isFinite(minutes)) {
            return null;
          }
          if (hours < 0 || minutes < 0 || minutes >= 60) {
            return null;
          }
          return Math.round(hours * 60 + minutes);
        }

        const hebrewMinutes = parseHebrewTimeToMinutes(raw);
        if (hebrewMinutes !== null) {
          return hebrewMinutes;
        }

        const decimalNormalized = raw.replace(/,/g, ".");
        if (!/^\d+(?:\.\d+)?$/.test(decimalNormalized)) {
          return null;
        }
        const hours = Number(decimalNormalized);
        if (!Number.isFinite(hours) || hours < 0) {
          return null;
        }
        return Math.round(hours * 60);
      };

      /*
        Examples:
        parseTimeToMinutes("15") === 900
        parseTimeToMinutes("7.5") === 450
        parseTimeToMinutes("7:30") === 450
        parseTimeToMinutes("6 שעות, 51 דקות") === 411
        calculateRemainingMinutes(900, parseTimeToMinutes("6 שעות, 51 דקות")) === 489
      */

      const calculateRemainingMinutes = (requiredMinutes, completedMinutes) => {
        return requiredMinutes - completedMinutes;
      };

      const getTodayDateString = () => {
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, "0");
        const day = String(now.getDate()).padStart(2, "0");
        return `${year}-${month}-${day}`;
      };

      const parseDateInput = (value) => {
        const normalized = sanitizeInput(value);
        if (!normalized) {
          return null;
        }

        const match = normalized.match(/^(\d{4})-(\d{2})-(\d{2})$/);
        if (!match) {
          return null;
        }

        const year = Number(match[1]);
        const month = Number(match[2]);
        const day = Number(match[3]);
        const parsed = new Date(year, month - 1, day);

        if (
          parsed.getFullYear() !== year ||
          parsed.getMonth() !== month - 1 ||
          parsed.getDate() !== day
        ) {
          return null;
        }

        return parsed;
      };

      const calculateRemainingDays = (deadlineValue) => {
        const deadlineDate = parseDateInput(deadlineValue);
        if (!deadlineDate) {
          return null;
        }

        const now = new Date();
        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const deadline = new Date(
          deadlineDate.getFullYear(),
          deadlineDate.getMonth(),
          deadlineDate.getDate(),
        );
        const millisecondsPerDay = 24 * 60 * 60 * 1000;
        return Math.floor((deadline - today) / millisecondsPerDay) + 1;
      };

      const calculateWeekdayRemainingDays = (currentDayValue, targetDayValue, includeToday) => {
        const currentDay = Number(currentDayValue);
        const targetDay = Number(targetDayValue);

        if (
          !Number.isInteger(currentDay) ||
          !Number.isInteger(targetDay) ||
          currentDay < 0 ||
          currentDay > 6 ||
          targetDay < 0 ||
          targetDay > 6
        ) {
          return null;
        }

        const dayDifference = (targetDay - currentDay + 7) % 7;
        if (includeToday) {
          return dayDifference + 1;
        }

        return dayDifference === 0 ? 7 : dayDifference;
      };

      const formatMinutesHebrew = (minutes) => {
        const total = Math.abs(minutes);
        const hours = Math.floor(total / 60);
        const mins = total % 60;
        return `${hours} שעות ו-${mins} דקות`;
      };

      const formatDailyMinutesHebrew = (minutesPerDay) => {
        const roundedMinutes = Math.ceil(minutesPerDay);
        return `${formatMinutesHebrew(roundedMinutes)} ליום`;
      };

      const buildResultInfo = (remainingMinutes) => {
        if (remainingMinutes === 0) {
          return "סיימת את היעד";
        }
        if (remainingMinutes < 0) {
          return `עברת את היעד ב-${formatMinutesHebrew(remainingMinutes)}`;
        }
        return formatMinutesHebrew(remainingMinutes);
      };

      const setResult = (text, isError) => {
        resultValue.textContent = text;
        resultBox.classList.toggle("error", isError);
      };

      const setDailyHours = (text, tone = "success") => {
        dailyHoursValue.textContent = text;
        dailyHoursValue.classList.toggle("is-muted", tone === "muted");
        dailyHoursValue.classList.toggle("is-error", tone === "error");
      };

      const getCalculationMode = () => {
        const selectedMode = calculationModeInputs.find((input) => input.checked);
        return selectedMode ? selectedMode.value : "date";
      };

      const syncModeVisibility = () => {
        const calculationMode = getCalculationMode();
        dateModePanel.hidden = calculationMode !== "date";
        weekdayModePanel.hidden = calculationMode !== "weekday";
      };

      const resolveRemainingDays = (calculationMode, deadlineRaw) => {
        if (calculationMode === "weekday") {
          const remainingDays = calculateWeekdayRemainingDays(
            currentDaySelect.value,
            targetDaySelect.value,
            includeTodayInput.checked,
          );

          if (remainingDays === null) {
            return { errorText: "בחירת ימים לא תקינה", tone: "error" };
          }

          return { remainingDays };
        }

        if (!deadlineRaw) {
          return { errorText: "בחרו תאריך יעד", tone: "muted" };
        }

        const remainingDays = calculateRemainingDays(deadlineRaw);
        if (remainingDays === null) {
          return { errorText: "תאריך לא תקין", tone: "error" };
        }

        if (remainingDays <= 0) {
          return { errorText: "תאריך היעד עבר", tone: "error" };
        }

        return { remainingDays };
      };

      const updateOutput = () => {
        const requiredRaw = requiredInput.value.trim();
        const completedRaw = completedInput.value.trim();
        const deadlineRaw = deadlineInput.value.trim();
        const calculationMode = getCalculationMode();

        if (!requiredRaw && !completedRaw) {
          setResult("—", false);
          setDailyHours("—", "muted");
          return;
        }

        if (!requiredRaw || !completedRaw) {
          setResult("נא למלא את שני השדות", true);
          setDailyHours("—", "muted");
          return;
        }

        const requiredMinutes = parseTimeToMinutes(requiredRaw);
        const completedMinutes = parseTimeToMinutes(completedRaw);

        if (requiredMinutes === null || completedMinutes === null) {
          setResult("קלט לא תקין. השתמשו בפורמט 7.5, 7:30 או 6 שעות 51 דקות", true);
          setDailyHours("—", "muted");
          return;
        }

        const remainingMinutes = calculateRemainingMinutes(requiredMinutes, completedMinutes);
        setResult(buildResultInfo(remainingMinutes), false);

        if (remainingMinutes <= 0) {
          setDailyHours("0 שעות ו-0 דקות ליום");
          return;
        }

        const daysResolution = resolveRemainingDays(calculationMode, deadlineRaw);
        if (daysResolution.errorText) {
          setDailyHours(daysResolution.errorText, daysResolution.tone);
          return;
        }

        setDailyHours(formatDailyMinutesHebrew(remainingMinutes / daysResolution.remainingDays));
      };

      const resetForm = () => {
        requiredInput.value = "";
        completedInput.value = "";
        deadlineInput.value = "";
        const todayWeekday = String(new Date().getDay());
        currentDaySelect.value = todayWeekday;
        targetDaySelect.value = todayWeekday;
        includeTodayInput.checked = true;
        calculationModeInputs.forEach((input) => {
          input.checked = input.value === "date";
        });
        syncModeVisibility();
        updateOutput();
      };

      const copyText = async (text) => {
        try {
          await navigator.clipboard.writeText(text);
        } catch (error) {
          const temp = document.createElement("textarea");
          temp.value = text;
          temp.setAttribute("readonly", "true");
          temp.style.position = "fixed";
          temp.style.opacity = "0";
          temp.style.pointerEvents = "none";
          document.body.appendChild(temp);
          temp.select();
          document.execCommand("copy");
          document.body.removeChild(temp);
        }
      };

      const showCopiedState = (button) => {
        const defaultLabel = button.dataset.defaultLabel || button.textContent.trim();
        button.dataset.defaultLabel = defaultLabel;
        clearTimeout(Number(button.dataset.copyTimeoutId) || 0);
        button.classList.add("is-copied");
        button.textContent = "הועתק";
        const timeoutId = window.setTimeout(() => {
          button.classList.remove("is-copied");
          button.textContent = defaultLabel;
          delete button.dataset.copyTimeoutId;
        }, 1500);
        button.dataset.copyTimeoutId = String(timeoutId);
      };

      const handleCommandCopy = async (event) => {
        const button = event.currentTarget;
        const command = button.dataset.copyCommand;
        if (!command) {
          return;
        }

        await copyText(command);
        showCopiedState(button);
      };

      requiredInput.addEventListener("input", updateOutput);
      completedInput.addEventListener("input", updateOutput);
      deadlineInput.addEventListener("input", updateOutput);
      currentDaySelect.addEventListener("change", updateOutput);
      targetDaySelect.addEventListener("change", updateOutput);
      includeTodayInput.addEventListener("change", updateOutput);
      calculationModeInputs.forEach((input) => {
        input.addEventListener("change", () => {
          syncModeVisibility();
          updateOutput();
        });
      });
      resetButton.addEventListener("click", resetForm);
      copyCommandButtons.forEach((button) => {
        button.addEventListener("click", handleCommandCopy);
      });

      const todayWeekday = String(new Date().getDay());
      currentDaySelect.value = todayWeekday;
      targetDaySelect.value = todayWeekday;
      deadlineInput.min = getTodayDateString();
      syncModeVisibility();
      updateOutput();
    </script>
  </body>
</html>
